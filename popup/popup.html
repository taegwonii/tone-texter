<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tone Texter</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💬 Tone Texter</h1>
            <p class="subtitle">Text naturally, sound like a native</p>
        </header>

        <main>
            <div class="input-section">
                <label for="input-text">Your message:</label>
                <textarea 
                    id="input-text" 
                    placeholder="Type what you want to say..."
                    rows="4"></textarea>
            </div>

            <div class="tone-selector">
                <label>Choose a tone:</label>
                <div class="tone-buttons">
                    <button class="tone-btn" data-tone="casual">😊 Casual</button>
                    <button class="tone-btn" data-tone="friendly">🤗 Friendly</button>
                    <button class="tone-btn" data-tone="flirty">💕 Flirty</button>
                    <button class="tone-btn" data-tone="genz">🔥 Gen Z</button>
                </div>
            </div>

            <button id="generate-btn" class="primary-btn">
                ✨ Get Suggestions
            </button>

            <div id="suggestions" class="suggestions-section hidden">
                <label>Suggestions:</label>
                <div id="suggestion-list"></div>
            </div>
        </main>

        <footer>
            <button id="settings-btn" class="link-btn">⚙️ Settings</button>
        </footer>
    </div>

    <script src="popup.js" type="module"></script>
</body>
</html>
