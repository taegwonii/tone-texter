<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ToneTexter Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="logo">✦ ToneTexter</div>
  <div class="tagline">Sound more natural when texting in English</div>

  <label>Anthropic API Key</label>
  <div class="input-row">
    <input type="password" id="apiKey" placeholder="sk-ant-api03-…" autocomplete="off" />
    <button class="toggle-vis" id="toggleVis" title="Show/hide key">👁</button>
  </div>

  <button class="save-btn" id="saveBtn">Save Key</button>
  <div class="status" id="status"></div>

  <hr />

  <div class="toggle-row">
    <span class="toggle-label">Light Mode</span>
    <label class="switch">
      <input type="checkbox" id="themeToggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <span class="toggle-label" id="toggleLabel">ToneTexter Active</span>
    <label class="switch">
      <input type="checkbox" id="enabledToggle" checked />
      <span class="slider"></span>
    </label>
  </div>

  <hr />

  <div class="info">
    Get your free API key at
    <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a>.
    <br /><br />
    Focus any text box on the page — ToneTexter's suggestion panel will appear automatically.
  </div>

  <div class="tones-preview">
    <span class="tone-chip">Casual</span>
    <span class="tone-chip">Friendly</span>
    <span class="tone-chip">Polite</span>
    <span class="tone-chip">Gen Z</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
