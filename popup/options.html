<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tone Texter — Settings</title>
    <link rel="stylesheet" href="options.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>⚙️ Tone Texter Settings</h1>
            <p class="subtitle">Configure your AI provider and API key</p>
        </header>

        <main>
            <section class="form-section">
                <label for="provider">AI Provider</label>
                <select id="provider">
                    <option value="openai">OpenAI (GPT-4o-mini)</option>
                    <option value="anthropic" disabled>Anthropic Claude (coming soon)</option>
                    <option value="gemini" disabled>Google Gemini (coming soon)</option>
                </select>
            </section>

            <section class="form-section">
                <label for="api-key">API Key</label>
                <input 
                    type="password" 
                    id="api-key" 
                    placeholder="sk-..." 
                    autocomplete="off">
                <p class="hint">
                    Get your key at 
                    <a href="https://platform.openai.com/api-keys" target="_blank">
                        platform.openai.com/api-keys
                    </a>
                </p>
                <p class="hint warning">
                    🔒 Your key is stored only in your browser and never sent anywhere except to the AI provider.
                </p>
            </section>

            <button id="save-btn" class="primary-btn">💾 Save Settings</button>
            <button id="test-btn" class="secondary-btn">🧪 Test Connection</button>

            <div id="status" class="status hidden"></div>
        </main>
    </div>

    <script src="options.js" type="module"></script>
</body>
</html>
